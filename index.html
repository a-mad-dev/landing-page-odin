<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Landing Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="nav-container">
        <nav class="navbar">
            <a href="#">Home</a>
            <ul class="nav-links">
                <li><a href="#hero">Hero</a></li>
                <li><a href="#cards">Cards</a></li>
                <li><a href="#quote">Quote</a></li>
                <li><a href="#cta">CTA</a></li>
                <li><a href="#foot">Footer</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <section class="hero" id="hero">
            <div class="hero-container">
                <div class="hero-text-cta">
                    <h1 class="hero-title">This Website is Awesome</h1>
                    <p class="hero-subtitle">This website has some subtext that goes here under the main title. it's smaller and lower contrast</p>
                    <button class="hero-cta-btn" type="button">Sign Up</button>
                </div>
                <img src="https://placehold.co/400x230" alt="Placeholder Image" class="hero-img">
            </div>
        </section>
        <section class="cards" id="cards">
            
        </section>
        <section class="quote" id="quote"></section>
        <section class="cta" id="cta"></section>
    </main>
    <footer class="foot" id="foot"></footer>
</body>
</html>
